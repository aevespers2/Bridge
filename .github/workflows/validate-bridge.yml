name: Validate Bridge Queue

on:
  workflow_dispatch:
  push:
    paths:
      - "exports/chatgpt_request_queue.jsonl"
      - "data/**"
      - "docs/evidence-graph/**"
      - "docs/BRIDGE_HEALTH_DASHBOARD.md"
      - "docs/CHAT_BUNDLE_DISPATCH.md"
      - "bundles/**"
      - "schemas/chatgpt_request.schema.json"
      - "schemas/chat_bundle.schema.json"
      - "scripts/**"
      - "manifests/codex_api_manifest.json"
      - "reports/evidence_graph.json"
      - "reports/reproducibility_report.json"
      - "reports/reproducibility_report.md"
      - "reports/bridge_health_latest.json"
      - "reports/bridge_health_latest.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate queue import
        run: python scripts/import_chatgpt_github_requests.py --source local --input exports/chatgpt_request_queue.jsonl
      - name: Process queue
        run: python scripts/process_chatgpt_request_queue.py
      - name: Run queue tests
        run: python -m unittest discover -s tests
      - name: Export evidence graph
        run: python scripts/export_evidence_graph.py
      - name: Export reproducibility report
        run: python scripts/export_reproducibility_report.py
      - name: Export Bridge health dashboard
        run: python scripts/export_bridge_health.py
      - name: Verify Chat Bundle dry run
        run: |
          python scripts/create_chat_bundle.py \
            --purpose "CI chat bundle smoke test" \
            --conversation-summary "Bounded summary for CI." \
            --codex-instructions "Validate and stage only." \
            --task "CI bundle smoke task" \
            --output /tmp/chatbundle-ci.json
          python scripts/import_chat_bundle.py /tmp/chatbundle-ci.json --dry-run
      - name: Verify dry-run commands
        run: |
          python scripts/run_seed_cluster_40128307.py
          python scripts/export_gis_api_snapshots.py
          bash scripts/publish_gist_snapshots.sh
