name: Codex Bridge
on:
  workflow_dispatch:
  push:
    paths:
      - "codex_bridge/requests.jsonl"
      - "codex_bridge/**"
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Codex bridge
        run: python codex_bridge/bridge_runner.py
      - name: Commit bridge output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "codex: process bridge queue"
          file_pattern: "codex_bridge/output/** codex_bridge/status.json"
